    // =============================================
    // UTILS: RGB <-> HSL (for legacy --accent-h/s/l)
    // =============================================
    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : { r: 0, g: 0, b: 0 };
    }
    
    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return {
        h: Math.round(h * 360),
        s: Math.round(s * 100),
        l: Math.round(l * 100)
      };
    }

    // =============================================
    // UPDATE PREVIEW
    // =============================================
    function updatePreview() {
      if (!loadedCSS) return;
      
      const doc = previewFrame.contentDocument;
      if (!doc || !doc.body) return;
      
      // Set accent color
      doc.body.style.setProperty('--color-accent', currentColor);
      
      // Set legacy HSL variables (for rules still using hsl())
      const rgb = hexToRgb(currentColor);
      const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
      doc.body.style.setProperty('--accent-h', hsl.h);
      doc.body.style.setProperty('--accent-s', hsl.s + '%');
      doc.body.style.setProperty('--accent-l', hsl.l + '%');
      
      // Toggle dark mode
      if (currentMode === 'dark') {
        doc.body.classList.add('theme-dark');
      } else {
        doc.body.classList.remove('theme-dark');
      }
      
      // Update inspector
      updateInspector(doc);
    }
    
    // =============================================
    // INSPECTOR
    // =============================================
    function updateInspector(doc) {
      if (!doc || !loadedCSS) {
        inspector.innerHTML = '<div class="inspector-hint">Load CSS to inspect values</div>';
        return;
      }
      
      // Parse all --* variable definitions from the loaded CSS
      const varRegex = /(--[\w-]+)\s*:/g;
      const foundVars = new Set();
      let match;
      while ((match = varRegex.exec(loadedCSS)) !== null) {
        foundVars.add(match[1]);
      }
      const varsToInspect = Array.from(foundVars).sort();
      
      // Create a temporary element to resolve colors
      const testEl = doc.createElement('div');
      doc.body.appendChild(testEl);
      
      let html = '';
      
      // Show OKLCH l value (computed from accent)
      testEl.style.backgroundColor = 'var(--color-accent)';
      const accentComputed = doc.defaultView.getComputedStyle(testEl).backgroundColor;
      html += makeInspectorRow('accent RGB', '--color-accent', accentComputed);
      
      // Inspect each variable found in CSS
      for (const varName of varsToInspect) {
        if (varName === '--color-accent') continue; // already shown above
        testEl.style.backgroundColor = 'var(' + varName + ')';
        const computed = doc.defaultView.getComputedStyle(testEl).backgroundColor;
        html += makeInspectorRow(varName, varName, computed);
      }
      
      doc.body.removeChild(testEl);
      inspector.innerHTML = html;
    }
    
    function makeInspectorRow(label, varName, computedColor) {
      // Try to show a swatch
      const swatch = computedColor && computedColor !== 'rgba(0, 0, 0, 0)' 
        ? '<span class="inspector-swatch" style="background:' + computedColor + '"></span>' 
        : '<span class="inspector-swatch" style="background:transparent"></span>';
      
      return '<div class="inspector-row">' +
        '<span class="inspector-var" title="' + varName + '">' + label + '</span>' +
        '<span style="display:flex;align-items:center">' +
          '<span class="inspector-val" title="' + computedColor + '">' + computedColor + '</span>' +
          swatch +
        '</span>' +
      '</div>';
    }
    
    // =============================================
    // EVENT HANDLERS
    // =============================================
    
    // Load CSS file
    cssLoader.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (event) => {
        loadedCSS = event.target.result;
        fileName.textContent = file.name;
        
        // Enable controls
        colorPicker.disabled = false;
        copyBtn.disabled = false;
        
        // Initialize iframe
        const doc = previewFrame.contentDocument;
        doc.open();
        doc.write(generatePreviewHTML(loadedCSS));
        doc.close();
        
        // Apply current color
        updatePreview();
      };
      reader.readAsText(file);
    });
    
    // Preset buttons
    presetList.addEventListener('click', (e) => {
      const btn = e.target.closest('.preset-btn');
      if (!btn) return;
      
      // Update active state
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      // Update color
      currentColor = btn.dataset.color;
      colorPicker.value = currentColor;
      colorValue.textContent = currentColor;
      
      updatePreview();
    });
    
    // Color picker
    colorPicker.addEventListener('input', (e) => {
      currentColor = e.target.value;
      colorValue.textContent = currentColor;
      
      // Remove preset active states
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      
      updatePreview();
    });
    
    // Mode toggle
    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        updatePreview();
      });
    });
    
    // Copy computed values
    copyBtn.addEventListener('click', () => {
      if (!loadedCSS) return;
      
      const doc = previewFrame.contentDocument;
      const testEl = doc.createElement('div');
      doc.body.appendChild(testEl);
      
      // Parse all --* variables from loaded CSS (same as inspector)
      const varRegex = /(--[\w-]+)\s*:/g;
      const foundVars = new Set();
      let m;
      while ((m = varRegex.exec(loadedCSS)) !== null) {
        foundVars.add(m[1]);
      }
      const varsToCopy = Array.from(foundVars).sort();
      
      let text = '/* Computed values for ' + currentColor + ' (' + currentMode + ' mode) */\n';
      text += '/* Generated by COLOURS Preview */\n\n';
      
      for (const v of varsToCopy) {
        testEl.style.backgroundColor = 'var(' + v + ')';
        const computed = doc.defaultView.getComputedStyle(testEl).backgroundColor;
        text += v + ': ' + computed + ';\n';
      }
      
      doc.body.removeChild(testEl);
      
      navigator.clipboard.writeText(text).then(() => {
        toast.textContent = 'Copied computed values!';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    });
    
    // =============================================
    // INIT
    // =============================================
    // Auto-select the bug red preset visually
    document.querySelector('[data-color="#B51A00"]').classList.add('active');
  </script>
</body>
</html>
